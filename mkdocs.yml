# Caminho relativo: mkdocs.yml
site_name: agentry
site_description: >-
  CLI agêntico de codificação em Rust, multi-provedor, com roteamento por classe de
  privacidade e controle auditável de egresso.
site_url: ""
repo_url: https://github.com/psiagoleal/agentry
repo_name: psiagoleal/agentry
edit_uri: edit/main/docs/
docs_dir: docs
site_dir: site

copyright: Distribuído sob a licença MIT — veja o arquivo LICENSE no repositório.

theme:
  name: material
  language: pt-BR
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: mudar para tema escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: mudar para tema claro
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - toc:
      permalink: true
      toc_depth: 3

plugins:
  - search:
      lang: pt

nav:
  - Início: index.md
  - Guia do Usuário:
      - Visão geral: usuario/index.md
      - Instalação: usuario/instalacao.md
      - Configuração (agentry.settings.json): usuario/configuracao.md
      - Uso da CLI e do REPL: usuario/uso.md
      - Skills: usuario/skills.md
      - Guardrails de conteúdo: usuario/guardrails.md
      - Perguntas frequentes: usuario/faq.md
  - Governança & Compliance:
      - Visão geral para times de segurança: governanca/index.md
      - Modelo de privacidade e egresso: governanca/privacidade-e-egresso.md
      - Auditoria e rastreabilidade: governanca/auditoria.md
      - Controle de permissões de ferramentas: governanca/permissoes.md
      - Guardrails de conteúdo (compliance): governanca/guardrails.md
      - Postura de dependências e cadeia de suprimentos: governanca/dependencias.md
      - Perguntas frequentes de segurança: governanca/faq.md
  - Desenvolvimento:
      - Arquitetura: architecture.md
      - Guia de testes: testing.md
      - Estado corrente (handoff): CURRENT-STATE.md
      - Decisões autônomas (loop): decisoes-autonomas.md
      - Registros de Decisão (ADRs):
          - Índice: adr/README.md
