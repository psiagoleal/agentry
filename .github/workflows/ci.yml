# Caminho relativo: .github/workflows/ci.yml
name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # fmt e clippy são independentes de plataforma — um único SO basta (ADR-0005).
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Formatação (rustfmt)
        run: cargo fmt --all -- --check
      - name: Lint (clippy)
        run: cargo clippy --all-targets --all-features -- -D warnings

  # Testes e build rodam nos três SOs tier-1 (ADR-0005).
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Testes
        run: cargo test --all --verbose
      - name: Build release
        run: cargo build --all --release

  # Camada independente da disciplina de segredos do repo: além do skill
  # `secrets-guard` (comportamento do assistente) e da redação automática do
  # audit log (ADR-0002/MT-06), varre todo push/PR por segredos commitados —
  # rede de segurança que não depende do agente ter seguido a política.
  # gitleaks: MIT, ativo (>28k stars); gitleaks-action não exige
  # GITLEAKS_LICENSE para repositórios pessoais (não é o caso de uma "Organization"
  # no GitHub), só para contas de organização.
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
