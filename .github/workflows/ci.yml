# Caminho relativo: .github/workflows/ci.yml
name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # fmt e clippy são independentes de plataforma — um único SO basta (ADR-0005).
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      # protoc: exigido pelo build script de lance-encoding (dependência
      # transitiva do lancedb, MT-27/ADR-0011) — sem ele, nem o clippy
      # compila o crate. Instalado via gerenciador de pacote nativo do SO,
      # não uma Action de terceiro (mesma preferência do ADR-0011 por
      # dependências nativas/sem ponte externa).
      - name: Instala protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Formatação (rustfmt)
        run: cargo fmt --all -- --check
      - name: Lint (clippy)
        run: cargo clippy --all-targets --all-features -- -D warnings

  # Testes e build rodam nos três SOs tier-1 (ADR-0005).
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # protoc: exigido pelo build script de lance-encoding (dependência
      # transitiva do lancedb, MT-27/ADR-0011) — instalado via gerenciador
      # de pacote nativo de cada SO da matriz (ADR-0005), sem depender de
      # uma Action de terceiro.
      - name: Instala protoc (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Instala protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf
      - name: Instala protoc (Windows)
        if: runner.os == 'Windows'
        run: choco install protoc -y
      - name: Testes
        run: cargo test --all --verbose
      - name: Build release
        run: cargo build --all --release

  # Camada independente da disciplina de segredos do repo: além do skill
  # `secrets-guard` (comportamento do assistente) e da redação automática do
  # audit log (ADR-0002/MT-06), varre todo push/PR por segredos commitados —
  # rede de segurança que não depende do agente ter seguido a política.
  # gitleaks: MIT, ativo (>28k stars); gitleaks-action não exige
  # GITLEAKS_LICENSE para repositórios pessoais (não é o caso de uma "Organization"
  # no GitHub), só para contas de organização.
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
